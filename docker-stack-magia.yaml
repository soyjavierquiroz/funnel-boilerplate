version: "3.8"

services:
  magia-abundancia-v1:
    image: nginx:1.27-alpine
    volumes:
      - /opt/webs/magiadelabundancia.com/dist:/usr/share/nginx/html:ro
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/nginx/conf.d/default.conf <<'EOF'
        server {
          listen 80;
          server_name _;
          root /usr/share/nginx/html;
          index index.html;

          location /assets/ {
            try_files $$uri =404;
            access_log off;
            add_header Cache-Control 'no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0';
          }

          location / {
            try_files $$uri $$uri/ /index.html;
          }
        }
        EOF
        exec nginx -g 'daemon off;'
    networks:
      - traefik_public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik_public"
        - "traefik.http.services.magia_abundancia_v1.loadbalancer.server.port=80"
        - "traefik.http.routers.magia_abundancia_v1.rule=Host(`magiadelabundancia.com`) || Host(`www.magiadelabundancia.com`)"
        - "traefik.http.routers.magia_abundancia_v1.entrypoints=websecure"
        - "traefik.http.routers.magia_abundancia_v1.tls=true"
        - "traefik.http.routers.magia_abundancia_v1.tls.certresolver=le"
        - "traefik.http.routers.magia_abundancia_v1.priority=100"

networks:
  traefik_public:
    external: true
