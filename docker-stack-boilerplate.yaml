version: "3.8"

# LEGACY Docker Swarm reference only.
# This is not the recommended deploy flow for clones.
# Before using it, review domain, routes, volumes, env, services, networks and certificates.
# The active CyberPanel flow builds dist/ and syncs it to public_html/ with deploy.sh.
services:
  boilerplate-v1:
    image: nginx:1.27-alpine
    volumes:
      - /opt/webs/${FUNNEL_DOMAIN:-aprendermotores.com}/dist:/usr/share/nginx/html:ro
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/nginx/conf.d/default.conf <<'EOF'
        server {
          listen 80;
          server_name _;
          root /usr/share/nginx/html;
          index index.html;

          location /assets/ {
            try_files $$uri =404;
            access_log off;
            add_header Cache-Control 'no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0';
          }

          location / {
            try_files $$uri $$uri/ /index.html;
          }
        }
        EOF
        exec nginx -g 'daemon off;'
    networks:
      - traefik_public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik_public"
        - "traefik.http.services.boilerplate_v1.loadbalancer.server.port=80"
        - "traefik.http.routers.boilerplate_v1.rule=Host(`${FUNNEL_DOMAIN:-aprendermotores.com}`) || Host(`www.${FUNNEL_DOMAIN:-aprendermotores.com}`)"
        - "traefik.http.routers.boilerplate_v1.entrypoints=websecure"
        - "traefik.http.routers.boilerplate_v1.tls=true"
        - "traefik.http.routers.boilerplate_v1.tls.certresolver=le"
        - "traefik.http.routers.boilerplate_v1.priority=100"

networks:
  traefik_public:
    external: true
